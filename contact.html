<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - CollegeNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
</head>
<body class="bg-white text-gray-800">
  <!-- Navbar -->

  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Contact Our Team</h1>
    
    <div class="grid md:grid-cols-2 gap-8 mb-12">
      <div>
        <h2 class="text-xl font-bold mb-4">Get in Touch</h2>
        <p class="text-gray-600 mb-4">Have questions? Our support team is here to help!</p>
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            📧 <span>support@collegenotes.com</span>
          </div>
          <div class="flex items-center gap-2">
            📞 <span>+1 (555) 123-4567</span>
          </div>
        </div>
      </div>
      <div>
        <h2 class="text-xl font-bold mb-4">Visit Us</h2>
        <p class="text-gray-600">
          123 Academia Road<br>
          Knowledge City, CA 98765<br>
          United States
        </p>
      </div>
    </div>

    <!-- Contact Form -->
    <form class="space-y-4">
      <div>
        <label class="block mb-2 font-medium">Full Name</label>
        <input type="text" class="w-full p-3 border rounded-lg">
      </div>
      <div>
        <label class="block mb-2 font-medium">Email Address</label>
        <input type="email" class="w-full p-3 border rounded-lg">
      </div>
      <div>
        <label class="block mb-2 font-medium">Message</label>
        <textarea rows="5" class="w-full p-3 border rounded-lg"></textarea>
      </div>
      <button class="bg-black text-white px-6 py-3 rounded-lg hover:bg-gray-800 w-full">
        Send Message
      </button>
    </form>
  </main>

  <!-- Footer -->
</body>
</html>
